<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f2f7ff" />
    <meta name="description" content="AYASA — Your AI-powered Digital Sanctuary for emotional wellness and stress detection." />
    <title>AYASA — Digital Sanctuary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Manrope:wght@400;500;600;700&family=Saira+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Noto+Serif:ital,wght@0,300;0,400;0,700;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        corePlugins: { preflight: false },
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-high":"#e8f1ff","secondary-container":"#ddd5ff",
              "on-surface-variant":"#4f5e78","inverse-surface":"#1b1f2c",
              "surface-container":"#eef4ff","on-background":"#1b1f2c",
              "on-secondary-container":"#2e2a5d","outline-variant":"#c8d4e8",
              "error":"#ffb4ab","surface-tint":"#38debb","tertiary":"#b2cfff",
              "surface":"#ffffff","surface-container-low":"#f6f9ff",
              "on-surface":"#1b1f2c","primary-container":"#2f7fe6",
              "secondary-fixed-dim":"#cebdff","surface-dim":"#e8f1ff",
              "primary-fixed-dim":"#4aa3ff","secondary":"#8172d8",
              "surface-bright":"#ffffff","background":"#f2f7ff",
              "surface-container-lowest":"#ffffff","primary":"#4aa3ff",
              "tertiary-container":"#cfe0ff","on-primary":"#ffffff",
              "outline":"#bcc9dd","surface-variant":"#dde7f7",
              "surface-container-highest":"#dde9ff"
            },
            fontFamily: {
              headline: ["Noto Serif"],
              body: ["Inter"],
              label: ["Plus Jakarta Sans"]
            }
          }
        }
      }
    </script>
    <style>
      html, body { background: #f2f7ff; margin: 0; padding: 0; }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
