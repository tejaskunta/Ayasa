services:
  # ── Python ML Backend ──────────────────────────────────────────────────────
  - type: web
    name: ayasa-ml-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: ml-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false          # set in Render dashboard
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: HF_TOKEN
        sync: false
      - key: RUNTIME_SYNC_TOKEN
        sync: false
      - key: PORT
        value: 8000

  # ── Node.js API Server ─────────────────────────────────────────────────────
  - type: web
    name: ayasa-server
    runtime: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false          # set in Render dashboard
      - key: MONGODB_URI
        sync: false          # set in Render dashboard — use MongoDB Atlas free tier
      - key: ML_BACKEND_URL
        fromService:
          name: ayasa-ml-backend
          type: web
          property: host
          # Render auto-injects the ML service's public URL here
      - key: RUNTIME_SYNC_TOKEN
        sync: false

  # ── React Static Site ──────────────────────────────────────────────────────
  - type: web
    name: ayasa-client
    runtime: static
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: ayasa-server
          type: web
          property: host
